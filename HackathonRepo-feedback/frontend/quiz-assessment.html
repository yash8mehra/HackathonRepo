<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Literacy Assessment - Finance IQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=Georgia:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <!-- Split CSS: load order matters — base vars first, themes last -->
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="screens.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="quiz.css">
  <link rel="stylesheet" href="results.css">
  <link rel="stylesheet" href="themes.css">
  
  <style>
    .rating-select {
      width: 100%;
      padding: 0.8rem;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.3s ease;
    }

    .rating-select:hover {
      border-color: var(--accent);
    }

    .rating-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1);
    }

    .options {
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- INTRO -->
  <div id="intro-screen" class="screen active">
    <div class="logo">💸 Finance IQ</div>
    <p class="tagline">Financial Literacy Assessment</p>
    <div class="card">
      <label>What's your name?</label>
      <input type="text" id="name-input" placeholder="Enter your name..." maxlength="30">
      <label>How old are you?</label>
      <input type="number" id="age-input" placeholder="Your age..." min="10" max="100">
      <label>Which best describes you?</label>
      <div class="radio-group" id="exp-group">
        <div class="radio-btn" data-val="none">💀 Zero clue</div>
        <div class="radio-btn" data-val="some">🧩 Some basics</div>
        <div class="radio-btn" data-val="good">📈 Pretty solid</div>
        <div class="radio-btn" data-val="pro">🏦 Finance nerd</div>
      </div>
    </div>
    <button class="btn" id="start-btn">Let's Go →</button>
    <div style="text-align:center; margin-top:2rem;">
      <a href="home.html" style="color:#999; text-decoration:none;">← Back to Home</a>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen" class="screen">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="q-meta">
      <span class="q-num" id="q-num-label">Question 1 of 20</span>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <button class="btn" id="next-btn" style="display:none;">Next →</button>
  </div>

  <!-- RESULTS -->
  <div id="results-screen" class="screen">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div id="results-content"></div>
    <button class="btn" id="restart-btn" style="margin-top:2rem;">Try Again ↻</button>
  </div>

</div>

<script type="module" src="main.js"></script>
</body>
</html>
